<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Mixer</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="mixer-app" id="mixer-app">

    <!-- Premium Glassmorphic Header -->
    <header class="mixer-header" id="mixer-header">
      <div class="header-brand-container">
        <div class="brand-glow-effect"></div>
        <div class="header-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z"/>
          </svg>
          <h1 class="brand-title">
            <span class="brand-accent-text">Antigravity</span><span class="brand-sub-text">MIXER</span>
          </h1>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="btn-spacing-toggle" title="Spacing Density: Normal">
          <!-- Comfortable Density Icon (Wide bars) -->
          <svg class="spacing-icon-comfortable" viewBox="0 0 24 24" width="14" height="14" style="display:none;">
            <path fill="currentColor" d="M4 4h16v2H4V4zm0 7h16v2H4v-2zm0 7h16v2H4v-2z"/>
          </svg>
          <!-- Normal Density Icon (Medium bars) -->
          <svg class="spacing-icon-normal" viewBox="0 0 24 24" width="14" height="14">
            <path fill="currentColor" d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"/>
          </svg>
          <!-- Compact Density Icon (Tight bars) -->
          <svg class="spacing-icon-compact" viewBox="0 0 24 24" width="14" height="14" style="display:none;">
            <path fill="currentColor" d="M4 8h16v2H4V8zm0 3h16v2H4v-2zm0 3h16v2H4v-2z"/>
          </svg>
        </button>
        <button class="header-btn" id="btn-theme-toggle" title="Toggle Theme">
          <svg class="theme-icon-dark" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <svg class="theme-icon-light" viewBox="0 0 24 24" width="14" height="14" style="display:none;"><path fill="currentColor" d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v2a1 1 0 0 1-2 0v-2a1 1 0 0 1 1-1zM5.22 5.22a1 1 0 0 1 1.42 0l1.41 1.41a1 1 0 0 1-1.42 1.42L5.22 6.64a1 1 0 0 1 0-1.42zm10.74 10.74a1 1 0 0 1 1.42 0l1.41 1.41a1 1 0 0 1-1.42 1.42l-1.41-1.41a1 1 0 0 1 0-1.42zM2 12a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2H3a1 1 0 0 1-1-1zm15 0a1 1 0 0 1 1-1h2a1 1 0 0 1 0 2h-2a1 1 0 0 1-1-1zM6.64 18.78a1 1 0 0 1 0-1.42l1.41-1.41a1 1 0 1 1 1.42 1.42l-1.41 1.41a1 1 0 0 1-1.42 0zm10.74-10.74a1 1 0 0 1 0-1.42l1.41-1.41a1 1 0 0 1 1.42 1.42l-1.41 1.41a1 1 0 0 1-1.42 0z"/></svg>
        </button>
        <button class="header-btn" id="btn-mute-all" title="Mute All Channels">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4l-2.12 2.12L12 8.24V4z"/></svg>
        </button>
        <button class="header-btn" id="btn-reset-all" title="Reset All Levels to 100%">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
        </button>
      </div>
    </header>

    <!-- Active Channels -->
    <section class="mixer-section" id="mixer-channels-section">
      <div class="section-label section-toggle" id="toggle-channels">
        <svg class="section-chevron" viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        <span class="section-label-dot active"></span>
        <span>ACTIVE CHANNELS</span>
        <span class="channel-count" id="active-count">0</span>
      </div>
      <div class="channels-container section-collapsible collapsed" id="channels-container">
        <div class="empty-state" id="empty-state">
          <svg viewBox="0 0 24 24" width="28" height="28" opacity="0.3"><path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6Z"/></svg>
          <p>No active channels</p>
          <p class="empty-hint">Click CAPTURE on an audible tab below</p>
        </div>
      </div>
    </section>

    <!-- Audible Tabs -->
    <section class="mixer-section" id="audible-section">
      <div class="section-label section-toggle" id="toggle-audible">
        <svg class="section-chevron" viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        <span class="section-label-dot audible"></span>
        <span>AUDIBLE TABS</span>
        <span class="channel-count" id="audible-count">0</span>
      </div>
      <div class="audible-list section-collapsible collapsed" id="audible-list">
        <div class="empty-state" id="audible-empty">
          <p class="empty-hint">No tabs playing audio</p>
        </div>
      </div>
    </section>

  </div>

  <!-- Status Toast (bottom-anchored) -->
  <div class="status-toast" id="status-toast"></div>

  <script src="popup.js"></script>
</body>
</html>
